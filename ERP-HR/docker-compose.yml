services:
  postgres:
    image: postgres:17
    container_name: erp-hr-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: erp_hr
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - erp-hr-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d erp_hr"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  erp-hr-pgdata:
